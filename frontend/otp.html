<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureVerify — OTP Verification</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d1117; --ink2: #1c2431; --ink3: #2d3748;
    --muted: #64748b; --line: #e2e8f0; --surface: #f8fafc;
    --white: #ffffff; --gold: #c9a84c; --green: #0d9488;
    --red: #dc2626; --orange: #ea580c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    background: var(--white);
    border-bottom: 1px solid var(--line);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-brand {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-brand span {
    width: 32px; height: 32px;
    background: var(--ink); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--gold); font-size: 1rem;
  }

  .nav-badge {
    font-family: 'DM Mono', monospace; font-size: 0.65rem;
    padding: 3px 10px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 20px;
    color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
  }

  .steps-bar {
    background: var(--white); border-bottom: 1px solid var(--line);
    padding: 16px 32px; display: flex; align-items: center; gap: 0; overflow-x: auto;
  }

  .step { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

  .step-num {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace; font-size: 0.72rem; font-weight: 500;
    border: 2px solid var(--line); color: var(--muted); background: var(--white); transition: all 0.3s;
  }

  .step-label { font-size: 0.78rem; font-weight: 500; color: var(--muted); white-space: nowrap; transition: all 0.3s; }
  .step.active .step-num { background: var(--ink); border-color: var(--ink); color: var(--gold); }
  .step.active .step-label { color: var(--ink); font-weight: 600; }
  .step.done .step-num { background: var(--green); border-color: var(--green); color: white; }
  .step.done .step-label { color: var(--green); }

  .step-connector { width: 40px; height: 2px; background: var(--line); flex-shrink: 0; margin: 0 4px; }
  .step.done + .step-connector { background: var(--green); }

  main {
    flex: 1; display: flex; align-items: flex-start;
    justify-content: center; padding: 40px 20px 60px;
  }

  .card {
    background: var(--white); border: 1px solid var(--line);
    border-radius: 16px; width: 100%; max-width: 480px;
    overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    animation: slideUp 0.4s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    padding: 28px 32px 24px; border-bottom: 1px solid var(--line);
    background: var(--ink); color: white; position: relative; overflow: hidden;
  }

  .card-header::after {
    content: ''; position: absolute; right: -20px; top: -20px;
    width: 120px; height: 120px; border-radius: 50%;
    background: rgba(201,168,76,0.12);
  }

  .card-header h2 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; margin-bottom: 6px; position: relative; }
  .card-header p  { font-size: 0.82rem; color: rgba(255,255,255,0.6); position: relative; }

  .card-body { padding: 32px; }

  /* ── OTP BOXES ───────────────────────── */
  .otp-group {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 24px 0;
  }

  .otp-box {
    width: 52px; height: 60px;
    border: 2px solid var(--line);
    border-radius: 10px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 1.6rem;
    font-weight: 500;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: var(--white);
  }

  .otp-box:focus {
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(13,17,23,0.08);
  }

  .otp-box.filled { border-color: var(--ink2); }
  .otp-box.error  { border-color: var(--red); animation: shake 0.4s; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  /* ── TIMER ───────────────────────────── */
  .timer-row {
    text-align: center;
    margin-bottom: 20px;
  }

  .timer-display {
    font-family: 'DM Mono', monospace;
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 2px;
  }

  .timer-display.warning { color: var(--orange); }
  .timer-display.expired { color: var(--red); }

  .timer-label {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── ATTEMPTS ────────────────────────── */
  .attempts-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 20px;
  }

  .attempt-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--green);
    transition: background 0.3s;
  }

  .attempt-dot.used { background: var(--red); }

  /* ── BUTTONS ─────────────────────────── */
  .btn {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }

  .btn-primary { background: var(--ink); color: white; }
  .btn-primary:hover { background: var(--ink2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
  .btn-primary:disabled { background: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-ghost {
    background: transparent; color: var(--ink); border: 1.5px solid var(--line);
    margin-top: 10px; font-size: 0.85rem;
  }
  .btn-ghost:hover { border-color: var(--ink); background: var(--surface); }
  .btn-ghost:disabled { color: var(--muted); border-color: var(--line); cursor: not-allowed; }

  .mobile-hint {
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 20px;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--line);
  }

  .mobile-hint strong { color: var(--ink); font-family: 'DM Mono', monospace; }

  /* ── DEV HINT ────────────────────────── */
  .dev-hint {
    margin-top: 16px;
    padding: 12px 14px;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 8px;
    font-size: 0.76rem;
    color: #92742a;
    font-family: 'DM Mono', monospace;
    line-height: 1.5;
  }

  .resend-cooldown {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-top: 6px;
  }

  #toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 12px 18px; border-radius: 10px;
    font-size: 0.82rem; font-weight: 500; z-index: 999;
    transform: translateY(80px); opacity: 0; transition: all 0.3s;
    max-width: 320px; box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  }

  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { background: var(--ink); color: white; border-left: 4px solid var(--green); }
  #toast.error   { background: var(--ink); color: white; border-left: 4px solid var(--red); }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .otp-box { width: 44px; height: 52px; font-size: 1.3rem; }
    .card-body { padding: 20px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-brand"><span>🔐</span> SecureVerify</div>
  <span class="nav-badge">KYC Platform</span>
</nav>

<div class="steps-bar">
  <div class="step done" id="step1">
    <div class="step-num">✓</div>
    <div class="step-label">Your Details</div>
  </div>
  <div class="step-connector"></div>
  <div class="step active" id="step2">
    <div class="step-num">2</div>
    <div class="step-label">OTP Verification</div>
  </div>
  <div class="step-connector"></div>
  <div class="step" id="step3">
    <div class="step-num">3</div>
    <div class="step-label">Deep Verification</div>
  </div>
  <div class="step-connector"></div>
  <div class="step" id="step4">
    <div class="step-num">4</div>
    <div class="step-label">Result</div>
  </div>
</div>

<main>
  <div class="card">
    <div class="card-header">
      <h2>Enter OTP</h2>
      <p>A 6-digit code has been sent to your mobile number</p>
    </div>
    <div class="card-body">

      <div class="mobile-hint" id="mobileHint">
        OTP sent to <strong id="mobileDisplay">••••••••••</strong>
      </div>

      <!-- TIMER -->
      <div class="timer-row">
        <div class="timer-display" id="timerDisplay">05:00</div>
        <div class="timer-label">Time remaining</div>
      </div>

      <!-- OTP INPUT BOXES -->
      <div class="otp-group">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="o1">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="o2">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="o3">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="o4">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="o5">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="o6">
      </div>

      <!-- ATTEMPTS -->
      <div class="attempts-bar" id="attemptsBar">
        <div class="attempt-dot" id="dot1"></div>
        <div class="attempt-dot" id="dot2"></div>
        <div class="attempt-dot" id="dot3"></div>
      </div>

      <button class="btn btn-primary" id="verifyBtn" onclick="verifyOTP()">
        Verify OTP →
      </button>

      <button class="btn btn-ghost" id="resendBtn" onclick="resendOTP()" disabled>
        Resend OTP
      </button>
      <div class="resend-cooldown" id="resendCooldown"></div>

      <div class="dev-hint">
        🛠 Dev Mode: OTP is printed in your backend terminal.<br>
        Check the terminal where <code>uvicorn</code> is running.
      </div>

    </div>
  </div>
</main>

<div id="toast"></div>

<script>
  const API = 'http://localhost:8000/api';

  const sessionId  = sessionStorage.getItem('session_id');
  const mobile     = sessionStorage.getItem('mobile');
  const expiresIn  = parseInt(sessionStorage.getItem('expires_in') || '300');

  // Guard — if no session, send back
  if (!sessionId) window.location.href = 'index.html';

  // Show masked mobile
  if (mobile) {
    document.getElementById('mobileDisplay').textContent =
      mobile.slice(0,2) + '••••••' + mobile.slice(-2);
  }

  // ── TIMER ───────────────────────────────────────────────────
  let timeLeft = expiresIn;
  let timerInterval;
  let resendCooldown = 0;
  let resendInterval;
  let attemptsUsed = 0;

  function startTimer() {
    timerInterval = setInterval(() => {
      timeLeft--;
      const m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
      const s = String(timeLeft % 60).padStart(2, '0');
      const el = document.getElementById('timerDisplay');
      el.textContent = `${m}:${s}`;

      if (timeLeft <= 60) el.className = 'timer-display warning';
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        el.className = 'timer-display expired';
        el.textContent = 'Expired';
        document.getElementById('verifyBtn').disabled = true;
        document.getElementById('resendBtn').disabled = false;
        showToast('OTP has expired. Please resend.', 'error');
      }
    }, 1000);
  }

  startTimer();

  // ── OTP BOX NAVIGATION ───────────────────────────────────────
  const boxes = [1,2,3,4,5,6].map(i => document.getElementById(`o${i}`));

  boxes.forEach((box, idx) => {
    box.addEventListener('input', (e) => {
      const val = e.target.value.replace(/\D/g, '');
      box.value = val;
      if (val) {
        box.classList.add('filled');
        if (idx < 5) boxes[idx + 1].focus();
        else box.blur();
      }
    });

    box.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !box.value && idx > 0) {
        boxes[idx - 1].focus();
        boxes[idx - 1].classList.remove('filled');
      }
    });

    box.addEventListener('paste', (e) => {
      e.preventDefault();
      const pasted = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
      pasted.split('').forEach((ch, i) => {
        if (boxes[i]) { boxes[i].value = ch; boxes[i].classList.add('filled'); }
      });
      if (pasted.length < 6 && boxes[pasted.length]) boxes[pasted.length].focus();
    });
  });

  function getOTP() {
    return boxes.map(b => b.value).join('');
  }

  function shakeBoxes() {
    boxes.forEach(b => { b.classList.add('error'); setTimeout(() => b.classList.remove('error'), 400); });
  }

  function clearBoxes() {
    boxes.forEach(b => { b.value = ''; b.classList.remove('filled'); });
    boxes[0].focus();
  }

  function markAttempt() {
    attemptsUsed++;
    const dot = document.getElementById(`dot${attemptsUsed}`);
    if (dot) dot.classList.add('used');
  }

  // ── VERIFY OTP ───────────────────────────────────────────────
  async function verifyOTP() {
    const otp = getOTP();
    if (otp.length < 6) { showToast('Please enter all 6 digits', 'error'); return; }

    setVerifyLoading(true);

    try {
      const res  = await fetch(`${API}/otp/verify`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ session_id: sessionId, otp }),
      });
      const data = await res.json();

      if (data.otp_verified) {
        clearInterval(timerInterval);
        showToast('OTP verified! Proceeding...', 'success');
        setTimeout(() => { window.location.href = 'verify.html'; }, 1200);
      } else {
        markAttempt();
        shakeBoxes();
        clearBoxes();
        showToast(data.message || 'Incorrect OTP', 'error');

        if (attemptsUsed >= 3) {
          document.getElementById('verifyBtn').disabled = true;
          showToast('Session locked. Please restart.', 'error');
        }
      }
    } catch (err) {
      showToast('Connection error. Is backend running?', 'error');
    }

    setVerifyLoading(false);
  }

  // ── RESEND OTP ───────────────────────────────────────────────
  async function resendOTP() {
    document.getElementById('resendBtn').disabled = true;

    try {
      const res  = await fetch(`${API}/otp/resend`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ session_id: sessionId }),
      });
      const data = await res.json();

      if (res.ok) {
        showToast('New OTP sent!', 'success');
        // Reset timer
        clearInterval(timerInterval);
        timeLeft = data.expires_in_sec || 300;
        document.getElementById('timerDisplay').className = 'timer-display';
        document.getElementById('verifyBtn').disabled = false;
        startTimer();
        clearBoxes();
        attemptsUsed = 0;
        [1,2,3].forEach(i => document.getElementById(`dot${i}`).classList.remove('used'));
        // Start resend cooldown
        startResendCooldown(30);
      } else {
        showToast(data.detail || 'Please wait before resending', 'error');
        document.getElementById('resendBtn').disabled = false;
      }
    } catch (err) {
      showToast('Connection error', 'error');
      document.getElementById('resendBtn').disabled = false;
    }
  }

  function startResendCooldown(sec) {
    resendCooldown = sec;
    const label = document.getElementById('resendCooldown');
    resendInterval = setInterval(() => {
      resendCooldown--;
      if (resendCooldown <= 0) {
        clearInterval(resendInterval);
        label.textContent = '';
        document.getElementById('resendBtn').disabled = false;
      } else {
        label.textContent = `Resend available in ${resendCooldown}s`;
      }
    }, 1000);
  }

  function setVerifyLoading(loading) {
    const btn = document.getElementById('verifyBtn');
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<div class="spinner"></div> Verifying...'
      : 'Verify OTP →';
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
    t.className = `show ${type}`;
    setTimeout(() => t.className = '', 3500);
  }

  // Focus first box on load
  boxes[0].focus();
</script>
</body>
</html>
